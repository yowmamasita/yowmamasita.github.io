      function base64urlDecode(s) {
        s = s.replace(/-/g, "+").replace(/_/g, "/");
        while (s.length % 4) s += "=";
        return Uint8Array.from(atob(s), c => c.charCodeAt(0));
      }

      try {
        const keyBuf = base64urlDecode(keyStr);
        const raw = base64urlDecode(encData);

        const iv = raw.slice(0, 12);
        const tag = raw.slice(12, 28);
        const ciphertext = raw.slice(28);

        const combined = new Uint8Array(ciphertext.length + 16);
        combined.set(ciphertext);
        combined.set(tag, ciphertext.length);

        const key = await crypto.subtle.importKey(
          "raw", keyBuf, "AES-GCM", false, ["decrypt"]
        );

        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv }, key, combined
        );

        const { title, body } = JSON.parse(new TextDecoder().decode(plain));
        document.getElementById("title").textContent = title;
        const sanitized = new DOMParser().parseFromString(body, "text/html");
        sanitized.querySelectorAll("script,iframe,object,embed,form").forEach(el => el.remove());
        sanitized.querySelectorAll("[onload],[onerror],[onclick],[onmouseover]").forEach(el => {
          for (const attr of [...el.attributes]) {
            if (attr.name.startsWith("on")) el.removeAttribute(attr.name);
          }
        });
        document.getElementById("body").innerHTML = sanitized.body.innerHTML;
        document.getElementById("error").style.display = "none";
        document.getElementById("content").style.display = "block";
        document.title = title;
      } catch {
        // wrong key or tampered data — leave the error message visible
      }
    })();
