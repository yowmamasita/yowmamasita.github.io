<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Private Note</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: "Source Sans Pro", -apple-system, BlinkMacSystemFont, sans-serif;
      max-width: 680px;
      margin: 0 auto;
      padding: 2rem 1rem;
      color: #333;
      line-height: 1.7;
    }
    #error {
      text-align: center;
      padding: 4rem 1rem;
      color: #999;
    }
    #error h1 { font-size: 1.3rem; margin-bottom: 0.5rem; }
    #error p { font-size: 0.95rem; }
    #content { display: none; }
    #content h1 {
      font-size: 1.6rem;
      margin-bottom: 0.3rem;
      color: #111;
    }
    #content .meta {
      color: #999;
      font-size: 0.85rem;
      margin-bottom: 1.5rem;
    }
    #content .body { font-size: 1.05rem; }
    #content .body p { margin-bottom: 1rem; }
    #content .body img { max-width: 100%; height: auto; }
    #content .body a { color: #4a7baa; }
    footer {
      margin-top: 3rem;
      padding-top: 1rem;
      border-top: 1px solid #eee;
      font-size: 0.8rem;
      color: #bbb;
      text-align: center;
    }
  </style>
</head>
<body>
  <div id="error">
    <h1>This note requires a valid link</h1>
    <p>Ask the person who shared it for the full URL.</p>
  </div>
  <div id="content">
    <h1 id="title"></h1>
    <div class="body" id="body"></div>
  </div>
  <footer>Private family note &mdash; not for public distribution</footer>

  <script>
    (async function () {
      const keyStr = location.hash.slice(1);
      if (!keyStr) return;

      const encData = "rUZq_zO9A_kgd6r1m2IZAyPbcDiE_iGQghJjlzC6wa2PAW__8cxDKF2-zhqRczum95KXw4T2FGxvyJwBTtdRSqODqumoxsBMYBXhY0IDCDK9XuMGlBBQMFtX7NA-rA7DR12DJA";

      function base64urlDecode(s) {
        s = s.replace(/-/g, "+").replace(/_/g, "/");
        while (s.length % 4) s += "=";
        return Uint8Array.from(atob(s), c => c.charCodeAt(0));
      }

      try {
        const keyBuf = base64urlDecode(keyStr);
        const raw = base64urlDecode(encData);

        const iv = raw.slice(0, 12);
        const tag = raw.slice(12, 28);
        const ciphertext = raw.slice(28);

        const combined = new Uint8Array(ciphertext.length + 16);
        combined.set(ciphertext);
        combined.set(tag, ciphertext.length);

        const key = await crypto.subtle.importKey(
          "raw", keyBuf, "AES-GCM", false, ["decrypt"]
        );

        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv }, key, combined
        );

        const { title, body } = JSON.parse(new TextDecoder().decode(plain));
        document.getElementById("title").textContent = title;
        document.getElementById("body").innerHTML = body;
        document.getElementById("error").style.display = "none";
        document.getElementById("content").style.display = "block";
        document.title = title;
      } catch {
        // wrong key or tampered data — leave the error message visible
      }
    })();
  </script>
</body>
</html>
