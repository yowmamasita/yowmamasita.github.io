      function base64urlDecode(s) {
        s = s.replace(/-/g, "+").replace(/_/g, "/");
        while (s.length % 4) s += "=";
        return Uint8Array.from(atob(s), c => c.charCodeAt(0));
      }

      try {
        const keyBuf = base64urlDecode(keyStr);
        const raw = base64urlDecode(encData);

        const iv = raw.slice(0, 12);
        const tag = raw.slice(12, 28);
        const ciphertext = raw.slice(28);

        const combined = new Uint8Array(ciphertext.length + 16);
        combined.set(ciphertext);
        combined.set(tag, ciphertext.length);

        const key = await crypto.subtle.importKey(
          "raw", keyBuf, "AES-GCM", false, ["decrypt"]
        );

        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv }, key, combined
        );

        const html = new TextDecoder().decode(plain);
        const blob = new Blob([html], { type: "text/html" });
        location.replace(URL.createObjectURL(blob));
